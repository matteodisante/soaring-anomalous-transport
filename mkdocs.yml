site_name: soaring-anomalous-transport
site_description: Master's thesis — anomalous transport in soaring flights. .igc data acquisition from the CFD FFVL.
site_url: https://matteodisante.github.io/soaring-anomalous-transport/
repo_url: https://github.com/matteodisante/soaring-anomalous-transport
repo_name: matteodisante/soaring-anomalous-transport
docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_section_style: table
            show_root_heading: true
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            filters: ["!^_"]

nav:
  - Home: index.md
  - Guide:
      - Installation: guide/installation.md
      - Data source (FFVL): guide/data-source.md
      - Downloading the data: guide/downloading.md
      - From the .igc file to the flight: guide/igc-to-flight.md
      - Pre-processing pipeline (blueprint): guide/preprocessing-pipeline.md
      - Bibliography (verification & local archive): guide/bibliography.md
  - API Reference: reference.md

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
