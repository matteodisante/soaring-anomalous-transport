# =============================================================================
#  Pre-processing thresholds -- the AUTHORITATIVE source.
#
#  Every numeric threshold of the trajectory pre-processing lives here, never
#  hard-coded in Python. To change a cut, edit the value here: nothing else needs
#  touching. Loaded by `soaring.analysis.preprocessing.load_preproc_config`.
#
#  Grouped by the pipeline level at which each acts (see the thesis chapter
#  "The dataset", sec:preproc, and docs/guide/preprocessing-pipeline.md). All speeds in
#  m/s, distances in km unless the name says otherwise; altitudes are barometric.
# =============================================================================

# --- fix level: applied PER FIX, on the raw geographic coordinates -----------
# Speeds here are great-circle (haversine) speeds between consecutive fixes
# (no coordinate conversion yet); see the thesis for the formula. Each bound sits in
# the physically-implausible tail of its per-fix distribution, so it removes GPS errors
# rather than signal (audited in the thesis, fig:fixlevel). Inter-fix gaps are handled
# once, at the flight level, by `sampling` below -- not with a second absolute bound here.
fix_level:
  # Per discipline: paragliders and hang gliders have markedly different speed
  # envelopes (thesis fig:fixlevel), so one shared bound is either too loose for the
  # slower type or clips real dynamics of the faster one. Values set from the full
  # per-fix distribution at a large sample (15000 paragliders, the full hang-glider
  # population), placed where the bin-to-bin ratio of a fine (2.5 m/s)
  # histogram actually settles near 1 -- i.e. where the decay stops, not just slows --
  # since a shallower-but-still-decreasing stretch beyond the steepest part of the
  # curve can still be genuine (rare but real) dynamics; only a genuinely flat tail
  # reads as a GPS/logger artifact with no credible speed explanation (hang gliders:
  # the decay first slows near ~40 m/s, but the genuinely flat plateau runs ~55 to
  # ~90 m/s, which is where the bound sits). Add a "sailplanes" key once that source
  # is in.
  max_horizontal_speed_mps:        # v_xy above this between two fixes => GPS position jump
    paragliders: 45.0
    "hang gliders": 55.0
  max_vertical_speed_mps: 13.0     # |v_z| (barometric) beyond the soaring climb/sink range --
                                   #   shared: the two disciplines' vz distributions are close
                                   #   enough that splitting it, unlike horizontal speed, buys
                                   #   nothing (thesis fig:fixlevel)
  min_altitude_m: -100.0           # plausible barometric-altitude range: lower bound
                                   #   (not per-discipline: bounds the barometric sensor's
                                   #   own reading range, not glider performance -- see thesis)
  max_altitude_m: 6000.0           # ... upper bound

# --- trimming: strip ground phases (take-off / landing), on v_xy alone --------
trimming:
  takeoff_speed_mps: 5.0           # airborne once v_xy exceeds this...
  sustained_s: 30.0                # ...continuously for at least this long

# --- flight level: applied PER FLIGHT (drops whole flights), from the track --
flight_level:
  min_duration_s: 2400.0           # 40 min: shortest genuine XC flight; the SMALLEST cut
                                   #   that clears sled runs / tows / aborted logs
  min_path_km: 30.0                # total flown path length (sum of great-circle steps);
                                   #   30 km removes non-flights, minimal bias on real XC

# --- sampling: intra-flight uniformity, a prerequisite for Savitzky-Golay -----
# Flight-level cuts: a flight too irregular to resample onto a uniform grid is excluded
# (audited in the thesis, fig:gaps).
sampling:
  max_gap_factor: 10.0             # split the flight at any inter-fix gap exceeding this
                                   #   multiple of its own native dt. Segments keep the
                                   #   parent's origin/clock and are analysed independently;
                                   #   the flight-level cuts are NOT re-applied to them (a
                                   #   minimal segment-duration key joins here with the
                                   #   routine). RELATIVE to native dt, so the tolerated
                                   #   absolute gap scales with the logger's rate; raising it
                                   #   much further would interpolate over ever-longer spans.
  max_missing_fraction: 0.10       # exclude if more than this fraction of the uniform grid
                                   #   at the native dt is left uncovered

# --- Savitzky-Golay smoothing + differentiation (per ENU component) ----------
# window is set PER FLIGHT from the noise timescale: window = odd(tau_c / dt).
# The vertical timescale is conditioned on the flight's alt_source (thesis, sec:savgol):
# the barometric channel is SMOOTHER than the horizontal and takes a shorter window; the
# GNSS vertical is noisier (vertical dilution of precision) and takes a longer one.
# Hence two vertical keys, not one.
savgol:
  polyorder: 3                     # >=2 for a clean 2nd derivative; insensitive within {2,3,4}
  tau_c_horizontal_s: 12.0         # PLACEHOLDER: smoothing timescale for E,N (from PSD knee)
  tau_c_vertical_baro_s: 8.0       # PLACEHOLDER: U on a barometric flight (smoother channel)
  tau_c_vertical_gnss_s: 20.0      # PLACEHOLDER: U on a GNSS-fallback flight (noisier channel)
