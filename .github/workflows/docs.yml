name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token, plus what the official Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; cancel a superseded run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build site
        run: |
          uv sync --no-default-groups --extra docs
          uv run --no-default-groups --extra docs mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
