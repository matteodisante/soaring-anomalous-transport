name: Deploy docs

# Auto-deploy on push, but ONLY when something that actually feeds the built site
# changes (docs pages, nav/config, or the source docstrings mkdocstrings renders into
# the API reference) -- not on every push, e.g. a change to the acquisition/analysis
# logic with no docstring change, or to the thesis/logbook. `workflow_dispatch` is kept
# for an on-demand redeploy (Actions tab -> Deploy docs -> Run workflow, or
# `gh workflow run docs.yml`).
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'src/soaring/**'
  workflow_dispatch:

# Least-privilege token, plus what the official Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; cancel a superseded run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build site
        run: |
          uv sync --no-default-groups --extra docs
          uv run --no-default-groups --extra docs mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
